{% extends "base.html" %}

{% block title %}GymAdmin{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="col-sm-10 col-md-8 col-lg-4">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <h3 class="fw-bold">🏋️‍♂️ GymAdmin</h3>
        <p class="text-muted mb-0">Please log in to continue</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Email</label>
          <input type="email" id="username" name="username" class="form-control" required placeholder="Enter your email">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">Login</button>

        <div class="mt-3 text-center">
          <a href="/forgot" class="text-secondary text-decoration-none small">Forgot password?</a>
        </div>
      </form>

      <div id="message" class="text-center mt-3 text-info small"></div>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  const token = localStorage.getItem('token');
  const user = localStorage.getItem('user');
  if (token && user) {
    window.location.href = '/dashboard';
  }

  const form = document.getElementById('loginForm');
  const msg = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.textContent = "⏳ Logging in...";

    const data = {
      email: form.username.value,
      password: form.password.value
    };

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (res.ok && result.token) {
        localStorage.setItem('token', result.token);
        localStorage.setItem('user', JSON.stringify(result));
        msg.className = "text-center mt-3 text-success small";
        msg.textContent = "✅ Login successful! Redirecting...";
        setTimeout(() => window.location.href = '/dashboard', 800);
      } else {
        msg.className = "text-center mt-3 text-danger small";
        msg.textContent = result.error || "❌ Invalid credentials.";
      }
    } catch (err) {
      console.error(err);
      msg.className = "text-center mt-3 text-warning small";
      msg.textContent = "⚠️ Network error. Try again later.";
    }
  });
</script>
{% endblock %}
