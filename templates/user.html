{% extends "base.html" %}
{% block title %}Detalles del Usuario - {{ gym_name or "Gimnasio" }}{% endblock %}

{% block content %}
<style>
  body { background-color: #f8fafc; font-family: "Inter", sans-serif; }

  .profile-header {
    background: white;
    border-radius: 24px;
    padding: 2.5rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }

  .profile-header::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 100px;
    background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
    opacity: 0.1;
  }

  .user-avatar-large {
    width: 140px;
    height: 140px;
    border-radius: 40px;
    object-fit: cover;
    border: 5px solid white;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    position: relative;
    z-index: 2;
    margin-bottom: 1.5rem;
  }

  .status-badge-lg {
    padding: 8px 16px;
    border-radius: 12px;
    font-size: 0.875rem;
    font-weight: 700;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 1rem;
  }

  .history-card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  .table thead th {
    background: #f8fafc;
    color: #64748b;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.75rem;
    padding: 1rem 1.5rem;
    border: none;
  }

  .btn-premium {
    border-radius: 12px;
    font-weight: 600;
    padding: 0.6rem 1.25rem;
    transition: all 0.3s ease;
  }

  .action-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }
</style>

<div class="action-bar">
  <a href="/manage-users" class="btn btn-premium btn-light border"><i class="bi bi-arrow-left me-2"></i>Volver</a>
  <div class="d-flex gap-2">
    <a href="/biometrics" id="bioLink" class="btn btn-premium btn-outline-primary"><i class="bi bi-activity me-2"></i>Biometrics</a>
    <button class="btn btn-premium btn-primary" data-bs-toggle="modal" data-bs-target="#editUserModal"><i class="bi bi-pencil-square me-2"></i>Editar</button>
  </div>
</div>

<div class="profile-header text-center">
  <img id="userAvatar" class="user-avatar-large" src="/static/default-user.png">
  <div id="statusBadge" class="status-badge-lg d-none"></div>
  <h2 id="userName" class="fw-bold text-dark m-0">Cargando...</h2>
  <p class="text-muted mt-1">ID Miembro: <span id="userIdDisplay" class="fw-bold">#---</span></p>
  
  <div class="row mt-4 justify-content-center">
    <div class="col-md-4">
      <div class="p-3 bg-light rounded-4">
        <span class="text-muted small d-block mb-1">Vencimiento</span>
        <h5 id="userExp" class="fw-bold m-0">—</h5>
      </div>
    </div>
  </div>
</div>

<div class="section-title mb-3 d-flex align-items-center gap-2">
  <i class="bi bi-calendar-check text-primary"></i>
  <h5 class="m-0 fw-bold">Historial de Entradas</h5>
</div>

<div class="history-card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead>
        <tr>
          <th>Fecha</th>
          <th class="text-end">Check-ins</th>
        </tr>
      </thead>
      <tbody id="entriesContainer">
        <tr><td colspan="2" class="text-center py-5 text-muted">Cargando historial...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal de Edición -->
<div class="modal fade" id="editUserModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 24px;">
      <div class="modal-header border-0 pb-0">
        <h5 class="fw-bold m-0">Editar Perfil</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="editUserForm">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Nombre Completo</label>
            <input type="text" id="editName" class="form-control rounded-3" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Fecha de Expiración</label>
            <input type="date" id="editExp" class="form-control rounded-3">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Actualizar Foto</label>
            <input type="file" id="editImage" class="form-control rounded-3" accept="image/*">
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-premium btn-light border" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-premium btn-primary px-4" onclick="guardarCambios()">Guardar Cambios</button>
      </div>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem("token");
  const params = new URLSearchParams(window.location.search);
  const userId = params.get("user_id");

  if (!token || !userId) window.location.href = "/manage-users";

  document.getElementById("bioLink").href = `/biometrics?user_id=${userId}`;
  document.getElementById("userIdDisplay").textContent = `#${userId}`;

  window.addEventListener("DOMContentLoaded", cargarDetalles);

  async function cargarDetalles() {
    try {
      const userRes = await fetch(`/api/users/${userId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const user = await userRes.json();

      document.getElementById("userName").textContent = user.name || "Desconocido";
      document.getElementById("editName").value = user.name || "";
      
      const avatar = document.getElementById("userAvatar");
      avatar.src = user.image ? `${user.image}` : `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random&color=fff&size=200`;

      // Status & Expiration
      const expDate = user.exp ? new Date(user.exp) : null;
      const today = new Date();
      today.setHours(0,0,0,0);

      const statusBadge = document.getElementById("statusBadge");
      statusBadge.classList.remove("d-none");
      
      if (expDate && expDate < today) {
        statusBadge.textContent = "Expirado";
        statusBadge.style.background = "#fee2e2";
        statusBadge.style.color = "#991b1b";
      } else {
        statusBadge.textContent = "Miembro Activo";
        statusBadge.style.background = "#dcfce7";
        statusBadge.style.color = "#166534";
      }

      document.getElementById("userExp").textContent = expDate ? expDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' }) : "—";
      document.getElementById("editExp").value = expDate ? expDate.toISOString().slice(0, 10) : "";

      // Entries History
      const entriesRes = await fetch(`/api/entries/user/${userId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      renderHistory(await entriesRes.json());
    } catch (err) {
      console.error(err);
    }
  }

  function renderHistory(entries) {
    const container = document.getElementById("entriesContainer");
    container.innerHTML = "";

    if (!entries.length) {
      container.innerHTML = `<tr><td colspan="2" class="text-center py-5 text-muted">Sin registros de entrada</td></tr>`;
      return;
    }

    const dayMap = new Map();
    entries.forEach(e => {
      const date = new Date(e.day).toLocaleDateString('es-ES');
      dayMap.set(date, (dayMap.get(date) || 0) + 1);
    });

    Array.from(dayMap.entries()).forEach(([date, count]) => {
      container.innerHTML += `
        <tr>
          <td class="ps-4 fw-medium">${date}</td>
          <td class="text-end pe-4"><span class="badge bg-light text-dark border">${count} Entradas</span></td>
        </tr>
      `;
    });
  }

  async function guardarCambios() {
    const name = document.getElementById("editName").value;
    const exp = document.getElementById("editExp").value;
    const imageFile = document.getElementById("editImage").files[0];

    let base64Image = null;
    if (imageFile) {
      base64Image = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(imageFile);
      });
    }

    try {
      const res = await fetch(`/api/users/${userId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ name, exp, image: base64Image })
      });

      if (res.ok) {
        location.reload();
      } else {
        alert("Error al actualizar");
      }
    } catch (err) { console.error(err); }
  }
</script>
{% endblock %}
