{% extends "base.html" %}
{% block title %}Recuperar Acceso - GymAdmin{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="col-sm-10 col-md-8 col-lg-4">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <h3 class="fw-bold m-0">Olvidé mi clave</h3>
        <p class="text-muted small mt-2">Enviaremos un código a tu correo</p>
      </div>

      <form id="forgotForm">
        <div class="mb-4">
          <label for="email" class="form-label small fw-bold text-muted text-uppercase">Correo Electrónico</label>
          <input type="email" id="email" class="form-control" required placeholder="tu@email.com">
        </div>
        <button type="submit" id="submitBtn" class="btn btn-primary w-100 mb-3">Enviar Código</button>
      </form>

      <div id="message" class="text-center small"></div>

      <div class="text-center mt-3 pt-3 border-top border-secondary border-opacity-25">
        <a href="/" class="text-muted small text-decoration-none fw-semibold"><i class="bi bi-arrow-left me-1"></i>Volver al Login</a>
      </div>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('forgotForm');
  const msg = document.getElementById('message');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Enviando...';
    
    try {
      const email = document.getElementById('email').value;
      const res = await fetch('/api/send-password-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({"email": email })
      });

      if (res.ok) {
        msg.className = "text-center text-success fw-bold small";
        msg.textContent = '✅ Código enviado. Redirigiendo...';
        setTimeout(() => window.location.href = "/reset?email=" + email, 1000);
      } else {
        const result = await res.json();
        msg.className = "text-center text-danger fw-bold small";
        msg.textContent = result.error || '❌ Error al enviar.';
        btn.disabled = false;
        btn.textContent = "Enviar Código";
      }
    } catch (err) {
      msg.className = "text-center text-warning fw-bold small";
      msg.textContent = '⚠️ Error de conexión.';
      btn.disabled = false;
    }
  });
</script>
{% endblock %}
