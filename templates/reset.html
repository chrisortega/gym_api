{% extends "base.html" %}
{% block title %}Restablecer Clave - GymAdmin{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="col-sm-10 col-md-8 col-lg-4">
    <div class="card p-4 shadow-sm">
      <div class="text-center mb-4">
        <h3 class="fw-bold m-0">Restablecer Clave</h3>
        <p class="text-muted small mt-2">Ingresa el código enviado a tu correo</p>
      </div>

      <form id="resetForm">
        <div class="mb-3">
          <label for="email" class="form-label small fw-bold text-muted text-uppercase">Email</label>
          <input type="email" id="email" class="form-control" disabled>
        </div>

        <div class="mb-3">
          <label for="code" class="form-label small fw-bold text-muted text-uppercase">Código de Verificación</label>
          <input type="text" id="code" class="form-control" required placeholder="123456">
        </div>

        <div class="mb-4">
          <label for="password" class="form-label small fw-bold text-muted text-uppercase">Nueva Contraseña</label>
          <input type="password" id="password" class="form-control" required placeholder="••••••••">
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary w-100 mb-3">Actualizar Contraseña</button>
      </form>

      <div id="message" class="text-center small"></div>
    </div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  document.getElementById("email").value = email;

  const form = document.getElementById('resetForm');
  const msg = document.getElementById('message');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Procesando...';

    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ 
          email: email, 
          password: document.getElementById('password').value, 
          code: document.getElementById('code').value 
        })
      });

      const result = await res.json();
      if (res.ok) {
        msg.className = "text-center text-success fw-bold small";
        msg.textContent = "✅ Contraseña actualizada. Redirigiendo...";
        setTimeout(() => window.location.href = "/", 1500);
      } else {
        msg.className = "text-center text-danger fw-bold small";
        msg.textContent = result.error || "❌ Error al restablecer.";
        btn.disabled = false;
        btn.textContent = "Actualizar Contraseña";
      }
    } catch (err) {
      msg.className = "text-center text-warning fw-bold small";
      msg.textContent = "⚠️ Error de conexión.";
      btn.disabled = false;
    }
  });
</script>
{% endblock %}
