{% extends "base.html" %}

{% block title %}Super Admin Panel{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-12">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="mb-0">Panel Super Admin - Gestión de Gimnasios</h3>
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addGymModal">
        <i class="bi bi-plus-circle"></i> Nuevo Gimnasio
      </button>
    </div>

    <div class="card shadow">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Nombre del Gimnasio</th>
                <th>Email del Admin</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody id="gymsTableBody">
              <tr><td colspan="4" class="text-center py-4">Cargando gimnasios...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Añadir Gimnasio -->
<div class="modal fade" id="addGymModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Registrar Nuevo Gimnasio y Admin</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addGymForm">
          <div class="mb-3">
            <label class="form-label">Nombre del Gimnasio</label>
            <input type="text" class="form-control" id="newGymName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email del Admin</label>
            <input type="email" class="form-control" id="newAdminEmail" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña del Admin</label>
            <input type="password" class="form-control" id="newAdminPass" required>
          </div>
        </form>
        <div id="addGymError" class="text-danger small mt-2"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="saveGymBtn">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Ensure the user is a super admin
  const token = localStorage.getItem("token");
  const userData = JSON.parse(localStorage.getItem("user") || "{}");

  if (!token || !userData.is_super_admin) {
    alert("Acceso denegado. Se requiere cuenta de Super Admin.");
    window.location.href = "/";
  }

  async function fetchGyms() {
    try {
      const res = await fetch("/api/superadmin/gyms", {
        headers: { "Authorization": `Bearer ${token}` }
      });
      if (res.status === 403) {
        alert("Sesión expirada o no autorizada");
        window.location.href = "/";
        return;
      }
      if (!res.ok) throw new Error("Error al cargar los gimnasios");

      const gyms = await res.json();
      const tbody = document.getElementById("gymsTableBody");
      tbody.innerHTML = "";

      if (gyms.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="text-center">No hay gimnasios registrados</td></tr>`;
        return;
      }

      gyms.forEach(gym => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${gym.gym_id}</td>
          <td class="fw-bold">${gym.gym_name}</td>
          <td>
            <div class="input-group input-group-sm" style="max-width: 250px;">
              <input type="email" class="form-control" value="${gym.admin_email}" id="email_${gym.admin_id}">
              <button class="btn btn-outline-primary" onclick="updateAdminEmail(${gym.admin_id})">
                <i class="bi bi-save"></i>
              </button>
            </div>
          </td>
          <td class="text-end">
            <button class="btn btn-sm btn-danger" onclick="deleteGym(${gym.gym_id}, '${gym.gym_name}')">
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </td>
        `;
        tbody.appendChild(tr);
      });

    } catch (err) {
      console.error(err);
      document.getElementById("gymsTableBody").innerHTML = `<tr><td colspan="4" class="text-danger text-center">Error de red</td></tr>`;
    }
  }

  async function updateAdminEmail(adminId) {
    const newEmail = document.getElementById(`email_${adminId}`).value;
    if (!newEmail) return alert("Email no puede estar vacío");
    
    if(!confirm("¿Actualizar email del administrador?")) return;

    try {
      const res = await fetch(`/api/superadmin/admins/${adminId}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ email: newEmail })
      });
      
      if (res.ok) {
        alert("Email actualizado exitosamente.");
        fetchGyms();
      } else {
        const data = await res.json();
        alert(data.error || "Error al actualizar");
      }
    } catch (err) {
      alert("Error de red");
    }
  }

  async function deleteGym(gymId, gymName) {
    if (!confirm(`¿Estás seguro de que deseas ELIMINAR el gimnasio "${gymName}"? Esta acción es irreversible y borrará todos sus datos.`)) return;

    try {
      const res = await fetch(`/api/superadmin/gyms/${gymId}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${token}` }
      });
      
      if (res.ok) {
        fetchGyms();
      } else {
        const data = await res.json();
        alert(data.error || "Error al eliminar");
      }
    } catch (err) {
      alert("Error de red");
    }
  }

  document.getElementById("saveGymBtn").addEventListener("click", async () => {
    const name = document.getElementById("newGymName").value;
    const email = document.getElementById("newAdminEmail").value;
    const pass = document.getElementById("newAdminPass").value;
    const errorDiv = document.getElementById("addGymError");
    
    errorDiv.textContent = "";

    if (!name || !email || !pass) {
      errorDiv.textContent = "Todos los campos son obligatorios";
      return;
    }

    const btn = document.getElementById("saveGymBtn");
    btn.disabled = true;
    btn.textContent = "Guardando...";

    try {
      const res = await fetch("/api/superadmin/gyms", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ gym_name: name, admin_email: email, admin_password: pass })
      });

      if (res.ok) {
        // close modal
        const modalEl = document.getElementById("addGymModal");
        const modal = bootstrap.Modal.getInstance(modalEl);
        modal.hide();
        
        // reset form
        document.getElementById("addGymForm").reset();
        
        // reload
        fetchGyms();
      } else {
        const data = await res.json();
        errorDiv.textContent = data.error || "Error al registrar el gimnasio";
      }
    } catch (err) {
      errorDiv.textContent = "Error de conexión";
    } finally {
      btn.disabled = false;
      btn.textContent = "Guardar";
    }
  });

  // Init
  document.addEventListener("DOMContentLoaded", fetchGyms);
</script>
{% endblock %}
