{% extends "base.html" %}
{% block title %}Usuarios - {{ gym_name or "Gimnasio" }}{% endblock %}

{% block content %}
<style>
  body {
    background-color: #f8fafc;
    font-family: "Inter", sans-serif;
  }

  .page-header {
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .user-card-table {
    background: white;
    border-radius: 20px;
    border: none;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  .table thead th {
    background: #f1f5f9;
    color: #64748b;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    border: none;
    padding: 1rem 1.5rem;
  }

  .table tbody td {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }

  .user-img {
    border-radius: 12px;
    width: 44px;
    height: 44px;
    object-fit: cover;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }

  .status-pill {
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.025em;
  }

  .status-active { background: #dcfce7; color: #166534; }
  .status-warning { background: #fef9c3; color: #854d0e; }
  .status-expired { background: #fee2e2; color: #991b1b; }

  .user-row {
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .user-row:hover {
    background-color: #f8fafc;
  }

  .btn-premium {
    border-radius: 12px;
    font-weight: 600;
    padding: 0.6rem 1.25rem;
    transition: all 0.3s ease;
  }

  .search-container {
    max-width: 400px;
    margin-bottom: 1.5rem;
  }

  .search-input {
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    padding: 0.75rem 1rem;
    box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  }
</style>

<div class="page-header">
  <div>
    <h2 class="fw-bold text-slate-900 m-0">Miembros</h2>
    <p class="text-muted small m-0">Gestiona los usuarios de tu gimnasio</p>
  </div>
  <div class="d-flex gap-2">
    <a href="/dashboard" class="btn btn-premium btn-light border"><i class="bi bi-arrow-left me-2"></i>Volver</a>
    <a href="/add-user" class="btn btn-premium btn-primary"><i class="bi bi-plus-lg me-2"></i>Nuevo Miembro</a>
  </div>
</div>

<div class="search-container">
  <div class="input-group">
    <span class="input-group-text bg-white border-end-0 rounded-start-2 px-3">
      <i class="bi bi-search text-muted"></i>
    </span>
    <input type="text" id="searchInput" class="form-control border-start-0 rounded-end-2 search-input" placeholder="Buscar por nombre o ID...">
  </div>
</div>

<div class="user-card-table">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Miembro</th>
          <th>Estado</th>
          <th>Vencimiento</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="5" class="text-center py-5 text-muted">Cargando miembros...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const userData = JSON.parse(localStorage.getItem('user') || '{}');
  const gymId = userData.gym_id;
  const tableBody = document.getElementById("usersTableBody");
  const searchInput = document.getElementById("searchInput");

  if (!token || !gymId) window.location.href = '/';

  let allUsers = [];

  async function fetchUsers() {
    try {
      const res = await fetch(`/api/users/gym/${gymId}`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      allUsers = await res.json();
      renderUsers(allUsers);
    } catch (err) {
      tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger py-5">Error al cargar usuarios</td></tr>`;
    }
  }

  function renderUsers(users) {
    if (!users.length) {
      tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">No se encontraron miembros</td></tr>`;
      return;
    }

    const today = new Date();
    today.setHours(0,0,0,0);

    tableBody.innerHTML = users.map(user => {
      const expDate = user.exp ? new Date(user.exp) : null;
      const diffDays = expDate ? Math.ceil((expDate - today) / (1000 * 60 * 60 * 24)) : 999;

      let statusLabel = "Activo";
      let statusClass = "status-active";

      if (expDate && expDate < today) {
        statusLabel = "Expirado";
        statusClass = "status-expired";
      } else if (diffDays <= 7) {
        statusLabel = "Próximo";
        statusClass = "status-warning";
      }

      const imgSrc = user.image ? `${user.image}` : `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random&color=fff&size=128`;

      return `
        <tr class="user-row" onclick="window.location='/user?user_id=${user.id}'">
          <td class="text-muted fw-medium">#${user.id}</td>
          <td>
            <div class="d-flex align-items-center gap-3">
              <img src="${imgSrc}" class="user-img">
              <span class="fw-bold text-dark">${user.name}</span>
            </div>
          </td>
          <td><span class="status-pill ${statusClass}">${statusLabel}</span></td>
          <td class="text-secondary small">
            ${expDate ? expDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' }) : 'Sin fecha'}
          </td>
          <td class="text-end">
            <i class="bi bi-chevron-right text-muted"></i>
          </td>
        </tr>
      `;
    }).join('');
  }

  searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = allUsers.filter(u => 
      u.name.toLowerCase().includes(term) || 
      String(u.id).includes(term)
    );
    renderUsers(filtered);
  });

  fetchUsers();
</script>
{% endblock %}
