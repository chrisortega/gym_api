<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title id="pageTitle">{% block title %}Gym{% endblock %}</title>

  <!-- CSS Frameworks -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --nav-bg: rgba(15, 23, 42, 0.9);
      --nav-border: rgba(255, 255, 255, 0.1);
      --accent-color: #6366f1;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      padding-bottom: 90px;
      background-color: #f8fafc;
    }

    .mobile-nav {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      height: 72px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--nav-border);
      border-radius: 20px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 9999;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      transition: all 0.3s ease;
    }

    .mobile-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.7rem;
      font-weight: 500;
      transition: all 0.2s ease;
      position: relative;
    }

    .mobile-nav-item i {
      font-size: 1.4rem;
      margin-bottom: 2px;
      transition: transform 0.2s ease;
    }

    .mobile-nav-item:hover {
      color: white;
    }

    .mobile-nav-item:hover i {
      transform: translateY(-2px);
    }

    .mobile-nav-item.active {
      color: var(--accent-color);
    }

    .mobile-nav-item.active::after {
      content: '';
      position: absolute;
      top: -12px;
      width: 4px;
      height: 4px;
      background: var(--accent-color);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-color);
    }

    /* Floating effect for main action */
    .nav-center-item {
      background: var(--accent-color);
      color: white !important;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      margin-top: -32px;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
    }

    .nav-center-item i {
      font-size: 1.6rem !important;
      margin: 0 !important;
    }

    .nav-center-item:hover {
      transform: translateY(-4px) scale(1.05) !important;
      background: #4f46e5;
    }

    /* Container refinement */
    .container {
      max-width: 800px;
      margin-top: 2rem;
    }
  </style>
</head>

<body>

  <nav id="mobileNav" class="mobile-nav">
    <!-- Links populated by JS -->
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Global fetch interceptor for expired sessions
    const originalFetch = window.fetch;
    window.fetch = async function (...args) {
      const response = await originalFetch.apply(this, args);
      const url = typeof args[0] === 'string' ? args[0] : (args[0] && args[0].url ? args[0].url : '');

      if ((response.status === 401 || response.status === 403) && !url.includes('/api/login')) {
        if (localStorage.getItem("token")) {
          logout();
        }
      }
      return response;
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      const userData = JSON.parse(localStorage.getItem("user") || "{}");
      const menuLinks = document.getElementById("mobileNav");
      const currentPath = window.location.pathname;

      if (token) {
        menuLinks.innerHTML = `
          <a href="/entries" class="mobile-nav-item nav-center-item ${currentPath === '/entries' ? 'active' : ''}">
            <i class="bi bi-lightning-charge-fill"></i>
             <span>Entradas</span>
          </a>
          <a href="/dashboard" class="mobile-nav-item ${currentPath === '/dashboard' ? 'active' : ''}">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Inicio</span>
          </a>
          <a href="/manage-users" class="mobile-nav-item ${currentPath === '/manage-users' ? 'active' : ''}">
            <i class="bi bi-people-fill"></i>
            <span>Usuarios</span>
          </a>

          <a href="/edit-gym" class="mobile-nav-item ${currentPath === '/edit-gym' ? 'active' : ''}">
            <i class="bi bi-shop"></i>
            <span>Mi Gym</span>
          </a>

          ${userData.is_super_admin ? `
          <a href="/superadmin" class="mobile-nav-item ${currentPath === '/superadmin' ? 'active' : ''}">
            <i class="bi bi-shield-lock-fill"></i>
            <span>S. Admin</span>
          </a>` : ''}
          <a href="/myperfil" class="mobile-nav-item ${currentPath === '/myperfil' ? 'active' : ''}">
            <i class="bi bi-person-badge-fill"></i>
            <span>Perfil</span>
          </a>
          <a id="logoutBtn" class="mobile-nav-item" style="cursor:pointer">
            <i class="bi bi-box-arrow-right"></i>
            <span>Salir</span>
          </a>
        `;
        document.getElementById("logoutBtn").onclick = logout;
      } else {
        menuLinks.style.display = 'none';
      }
    });

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/";
    }
  </script>

</body>

</html>
