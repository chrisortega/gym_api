<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title id="pageTitle">{% block title %}Gym{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
.mobile-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 65px;
  background: #111;
  border-top: 1px solid #333;
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 9999;
}

.mobile-nav-item {
  flex: 1;
  text-align: center;
  color: white;
  font-size: 0.8rem;
  text-decoration: none;
  padding-top: 6px;
}

.mobile-nav-item i {
  font-size: 1.55rem;
  display: block;
  margin-bottom: 2px;
}

.mobile-nav-item.active {
  color: #0d6efd;
}



/* Space for bottom menu so content doesn't hide */
body {
  padding-bottom: 75px;
}

  </style>
</head>
<body class="bg-light">

<nav id="mobileNav" class="mobile-nav ">

</nav>


  <!-- MAIN CONTENT -->
  <div class="container"  >
    {% block content %}{% endblock %}
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Global fetch interceptor for expired sessions
    const originalFetch = window.fetch;
    window.fetch = async function(...args) {
      const response = await originalFetch.apply(this, args);
      const url = typeof args[0] === 'string' ? args[0] : (args[0] && args[0].url ? args[0].url : '');
      
      // If unauthorized/forbidden and not trying to login, log the user out
      if ((response.status === 401 || response.status === 403) && !url.includes('/api/login')) {
        if (localStorage.getItem("token")) {
           logout();
        }
      }
      return response;
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      const userData = JSON.parse(localStorage.getItem("user") || "{}");

  
      
      const menuLinks = document.getElementById("mobileNav");

      let gymName = "Mi Gimnasio";
      let gymImage = "/static/default-gym.png";

      

      if (token && userData.gym_id) {
        try {
          const res = await fetch(`/api/gym/${userData.gym_id}`, {
            headers: { "Authorization": `Bearer ${token}` }
          });

          if (res.ok) {
            const gym = await res.json();
            gymName = gym.name || gymName;
            if (gym.image) gymImage = `data:image/jpeg;base64,${gym.image}`;
          }
        } catch {}
      }

      
      
      

      /* Dynamic menu */
      if (token) {
        menuLinks.innerHTML = `
          <a href="/manage-users" class="mobile-nav-item">
            <i class="bi bi-people-fill"></i>
            <span>Usuarios</span>
          </a>              
            <a href="/entries" class="mobile-nav-item">
            <i class="bi bi-door-open-fill"></i>
            <span>Entradas</span>
          </a>

            <a href="/edit-gym" class="mobile-nav-item">
    <i class="bi bi-gear-fill"></i>
    <span>Mi Gym</span>
  </a>

              <a id="logoutBtn" class="mobile-nav-item">
    <i class="bi bi-gear-fill"></i>
    <span>Salir</span>
  </a>
          
        `;
        document.getElementById("logoutBtn").onclick = logout;
      }


        

    });
    

    function logout() {
      
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/";
    }



    
  </script>

</body>
</html>
