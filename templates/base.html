<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title id="pageTitle">{% block title %}Gym{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">

  <!-- CSS Frameworks -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

  <!-- NAVIGATION -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4" id="mainNavbar" style="display: none;">
    <div class="container-fluid">
      <a class="navbar-brand" href="/dashboard">
        <span id="navbarGymName">GymAdmin</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto" id="navbarNavLinks">
          <!-- Dynamic Links -->
        </ul>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Global fetch interceptor for expired sessions
    const originalFetch = window.fetch;
    window.fetch = async function (...args) {
      const response = await originalFetch.apply(this, args);
      const url = typeof args[0] === 'string' ? args[0] : (args[0] && args[0].url ? args[0].url : '');

      if ((response.status === 401 || response.status === 403) && !url.includes('/api/login')) {
        if (localStorage.getItem("token")) {
          logout();
        }
      }
      return response;
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const token = localStorage.getItem("token");
      const userData = JSON.parse(localStorage.getItem("user") || "{}");
      const navbarElement = document.getElementById("mainNavbar");
      const navbarNavLinks = document.getElementById("navbarNavLinks");
      const navbarGymName = document.getElementById("navbarGymName");
      const currentPath = window.location.pathname;

      if (token) {
        navbarElement.style.display = "block";

        let gymName = "Mi Gimnasio";

        if (userData.gym_id) {
          try {
            const res = await fetch(`/api/gym/${userData.gym_id}`, {
              headers: { "Authorization": `Bearer ${token}` }
            });

            if (res.ok) {
              const gym = await res.json();
              gymName = gym.name || gymName;
            }
          } catch (e) {
            console.error("Error fetching gym data:", e);
          }
        }

        navbarGymName.textContent = gymName;

        navbarNavLinks.innerHTML = `
          <li class="nav-item">
            <a href="/dashboard" class="nav-link ${currentPath === '/dashboard' ? 'active' : ''}">
              <i class="bi bi-grid-1x2-fill me-1"></i> Inicio
            </a>
          </li>
          <li class="nav-item">
            <a href="/entries" class="nav-link ${currentPath === '/entries' ? 'active' : ''}">
              <i class="bi bi-lightning-charge-fill me-1"></i> Entradas
            </a>
          </li>
          <li class="nav-item">
            <a href="/manage-users" class="nav-link ${currentPath === '/manage-users' ? 'active' : ''}">
              <i class="bi bi-people-fill me-1"></i> Usuarios
            </a>
          </li>
          ${userData.type !== 'worker' ? `
          <li class="nav-item">
            <a href="/edit-gym" class="nav-link ${currentPath === '/edit-gym' ? 'active' : ''}">
              <i class="bi bi-shop me-1"></i> Mi Gym
            </a>
          </li>` : ''}
          ${userData.is_super_admin ? `
          <li class="nav-item">
            <a href="/superadmin" class="nav-link ${currentPath === '/superadmin' ? 'active' : ''}">
              <i class="bi bi-shield-lock-fill me-1"></i> S. Admin
            </a>
          </li>` : ''}
          <li class="nav-item">
            <a href="/myperfil" class="nav-link ${currentPath === '/myperfil' ? 'active' : ''}">
              <i class="bi bi-person-badge-fill me-1"></i> Perfil
            </a>
          </li>
          <li class="nav-item">
            <a href="#" id="logoutBtn" class="nav-link text-danger">
              <i class="bi bi-box-arrow-right me-1"></i> Salir
            </a>
          </li>
        `;

        document.getElementById("logoutBtn").onclick = (e) => {
          e.preventDefault();
          logout();
        };
      }
    });

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      window.location.href = "/";
    }
  </script>
</body>

</html>
